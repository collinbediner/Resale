name: Preview GitHub Pages

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  preview:
    needs: test
    # Documentation-only pull requests do not change the deployed storefront.
    if: needs.test.outputs.validation-tier == 'full' || github.event.action == 'closed'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://shopresalelane.com/pr-preview/pr-${{ github.event.pull_request.number }}/
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Build fingerprinted release
        env:
          RELEASE_ID: ${{ github.event.pull_request.head.sha }}
        run: npm run build

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./dist

name: Test Website

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Run checks and tests
        env:
          RELEASE_ID: ${{ github.sha }}
        run: npm run check

      - name: Validate Worker environments
        run: npm run worker:check

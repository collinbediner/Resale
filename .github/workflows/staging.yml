name: Deploy Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: test
    # A documentation-only merge has no staging artifact to redeploy.
    if: needs.test.outputs.validation-tier == 'full'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://shopresalelane.com/staging/
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Build fingerprinted release
        env:
          RELEASE_ID: ${{ github.sha }}
        run: npm run build

      - name: Deploy staging path
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: staging
          keep_files: true

name: Daily Production Check

on:
  schedule:
    - cron: "15 13 * * *"
  workflow_dispatch:
    inputs:
      force_failure:
        description: "Mark this manual run as a simulated outage to verify alerting."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check production
        id: uptime
        env:
          FORCE_FAILURE: ${{ github.event.inputs.force_failure == 'true' && 'true' || 'false' }}
        shell: bash
        run: |
          set +e
          result=$(curl --location --silent --show-error \
            --output response.html \
            --write-out "%{http_code} %{time_total}" \
            "https://shopresalelane.com/?monitor=${GITHUB_RUN_ID}")
          curl_exit=$?
          http_code=$(echo "$result" | awk '{print $1}')
          duration=$(echo "$result" | awk '{print $2}')

          if [[ "$curl_exit" -eq 0 && "$http_code" == "200" ]] &&
             grep -q "Premium Vendors for Resellers" response.html; then
            site_status="PASS"
          else
            site_status="FAIL"
          fi

          api_result=$(curl --silent --show-error --output api-response.json \
            --write-out "%{http_code}" "https://api.shopresalelane.com/health")
          api_exit=$?
          if [[ "$api_exit" -eq 0 && "$api_result" == "200" ]] &&
             jq -e '.ok == true and .environment == "production" and .services.d1 == "schema-ready" and .services.r2 == "connected"' api-response.json >/dev/null; then
            api_status="PASS"
          else
            api_status="FAIL"
          fi

          if [[ "$site_status" == "PASS" && "$api_status" == "PASS" ]]; then status="PASS"; else status="FAIL"; fi

          if [[ "$FORCE_FAILURE" == "true" ]]; then
            status="FAIL"
            site_status="FAIL"
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "site_status=$site_status" >> "$GITHUB_OUTPUT"
          echo "api_status=$api_status" >> "$GITHUB_OUTPUT"
          echo "http_code=${http_code:-none}" >> "$GITHUB_OUTPUT"
          echo "duration=${duration:-unknown}" >> "$GITHUB_OUTPUT"

          {
            echo "## ResaleLane daily production check"
            echo "- Result: **$status**"
            echo "- Storefront: **$site_status**"
            echo "- Private API: **$api_status**"
            echo "- HTTP status: ${http_code:-none}"
            echo "- Response time: ${duration:-unknown}s"
            echo "- URL: https://shopresalelane.com/"
            if [[ "$FORCE_FAILURE" == "true" ]]; then
              echo "- Mode: **Simulated failure (manual test)**"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Email daily checkpoint through the private Worker
        continue-on-error: true
        env:
          UPTIME_MONITOR_TOKEN: ${{ secrets.UPTIME_MONITOR_TOKEN }}
          CHECK_STATUS: ${{ steps.uptime.outputs.status }}
          SITE_STATUS: ${{ steps.uptime.outputs.site_status }}
          API_STATUS: ${{ steps.uptime.outputs.api_status }}
          HTTP_CODE: ${{ steps.uptime.outputs.http_code }}
          DURATION: ${{ steps.uptime.outputs.duration }}
        shell: bash
        run: |
          if [[ -z "$UPTIME_MONITOR_TOKEN" ]]; then
            echo "Monitor token is not configured yet; email was skipped."
            exit 0
          fi

          payload=$(jq -n \
            --arg status "$CHECK_STATUS" \
            --arg siteStatus "$SITE_STATUS" \
            --arg apiStatus "$API_STATUS" \
            --arg httpCode "$HTTP_CODE" \
            --arg duration "$DURATION" \
            --arg runUrl "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{status:$status,siteStatus:$siteStatus,apiStatus:$apiStatus,httpCode:$httpCode,duration:$duration,runUrl:$runUrl}')

          curl --fail --silent --show-error \
            --request POST \
            --url https://api.shopresalelane.com/internal/monitor \
            --header "Authorization: Bearer $UPTIME_MONITOR_TOKEN" \
            --header "Content-Type: application/json" \
            --data "$payload"

      - name: Fail on outage
        if: steps.uptime.outputs.status != 'PASS'
        run: exit 1
